version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: chat_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  chatbackend:
    build: 
      context: ./chatbackend
    container_name: chat_backend
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    env_file:
      - ./chatbackend/.env
    depends_on:
      - mongodb
    restart: unless-stopped

  chatfrontend:
    build: 
      context: ./chatfrontend
    container_name: chat_frontend
    ports:
      - "3000:3000"
    depends_on:
      - chatbackend
    environment:
      - VITE_API_URL=http://localhost:4000
    restart: unless-stopped

volumes:
  mongo_data: